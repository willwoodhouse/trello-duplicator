<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();
    var params = new URLSearchParams(window.location.search);
    var cardId = params.get('cardId');

    document.getElementById('status').innerText = 'Card ID: ' + cardId + ' — calling script...';

    t.render(function() {
      fetch('https://script.google.com/macros/s/AKfycbyGoiFvLNBadhaO412aKQ3lw3akx5gRw1ypFtfzmqwNgKOoDO0id9rxQ--Zjh-xp4jcBA/exec?cardId=' + cardId, {
        method: 'GET',
        redirect: 'follow'
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById('status').innerText = JSON.stringify(data);
      })
      .catch(function(err) {
        document.getElementById('status').innerText = 'Error: ' + err.message;
      });
    });
  </script>
</head>
<body>
  <p id="status">Loading...</p>
</body>
</html>
