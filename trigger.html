<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <p id="status">Running...</p>
  <script>
    var t = TrelloPowerUp.iframe();
    var params = new URLSearchParams(window.location.search);
    var cardId = params.get('cardId');

    document.getElementById('status').innerText = 'Calling script for card: ' + cardId;

    fetch('https://trello-duplicator.will-f86.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cardId: cardId })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      document.getElementById('status').innerText = JSON.stringify(data);
    })
    .catch(function(err) {
      document.getElementById('status').innerText = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
